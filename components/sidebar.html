<!-- Sidebar Styles -->
<style>
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 260px;
    height: 100vh;
    background: var(--white);
    box-shadow: var(--shadow-lg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
}

.sidebar.active {
    transform: translateX(0);
}

.sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    color: var(--white);
}

.sidebar-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.25rem;
    font-weight: 700;
}

.sidebar-logo i {
    font-size: 1.5rem;
}

.sidebar-close {
    width: 32px;
    height: 32px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-radius: var(--radius);
    color: var(--white);
    cursor: pointer;
    display: none;
}

.sidebar-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--gray-100);
}

.sidebar-avatar {
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-weight: 600;
    font-size: 1.1rem;
}

.sidebar-user-info h4 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--gray-800);
}

.sidebar-user-info p {
    font-size: 0.75rem;
    color: var(--gray-500);
}

.sidebar-nav {
    flex: 1;
    padding: 1rem 0;
    overflow-y: auto;
}

.sidebar-nav-section {
    padding: 0 0.75rem;
    margin-bottom: 1rem;
}

.sidebar-nav-title {
    display: block;
    padding: 0.5rem 0.75rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.sidebar-nav-link {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    margin: 0.25rem 0;
    color: var(--gray-600);
    font-size: 0.9rem;
    text-decoration: none;
    border-radius: var(--radius);
    transition: var(--transition);
}

.sidebar-nav-link:hover {
    background: var(--gray-50);
    color: var(--primary);
}

.sidebar-nav-link.active {
    background: rgba(13, 148, 136, 0.1);
    color: var(--primary);
    font-weight: 500;
}

.sidebar-nav-link i {
    width: 20px;
    text-align: center;
}

.sidebar-footer {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--gray-100);
    text-align: center;
}

.sidebar-footer p {
    font-size: 0.75rem;
    color: var(--gray-400);
    margin: 0;
}

/* Desktop - Show Sidebar */
@media (min-width: 1024px) {
    .sidebar {
        transform: translateX(0);
    }
    
    .sidebar-close {
        display: flex;
        align-items: center;
        justify-content: center;
    }
}
</style>
