<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Data Mahasiswa - SIMARAJA">
    <title>Data Mahasiswa - SIMARAJA</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <!-- Dashboard Page -->
    <div class="dashboard-page admin-page">
        <!-- Header -->
        <header class="dashboard-header admin-header">
            <h1><i class="fas fa-landmark"></i> SIMARAJA</h1>
            <div class="header-actions">
                <button class="user-menu-btn" onclick="toggleAdminMenu()">
                    <div class="user-avatar-small admin">
                        <i class="fas fa-user-shield"></i>
                    </div>
                </button>
            </div>
        </header>

        <!-- Admin Dropdown Menu -->
        <div class="user-dropdown" id="admin-dropdown">
            <div class="dropdown-header">
                <div class="dropdown-avatar admin">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h4>Administrator</h4>
                    <p>Pemerintah Raja Ampat</p>
                </div>
            </div>
            <div class="dropdown-menu">
                <a href="#" onclick="confirmLogout()">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <main class="dashboard-main">
            <section class="dashboard-section">
                <div class="section-title">
                    <button class="back-section-btn" onclick="window.location.href='/pages/pemerintah/dashboard-admin.html'">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2>Data Mahasiswa</h2>
                </div>

                <!-- Search -->
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-mahasiswa" placeholder="Cari nama atau NIM..." oninput="searchMahasiswa()">
                </div>

                <div id="admin-mahasiswa-list" class="admin-mahasiswa-list">
                    <!-- Populated by JS -->
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav admin-nav">
            <a href="/pages/pemerintah/dashboard-admin.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/pages/pemerintah/verifikasi.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Pengajuan</span>
            </a>
            <a href="/pages/pemerintah/laporan.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Mahasiswa</span>
            </a>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Konfirmasi</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <p id="modal-message">Apakah Anda yakin?</p>
            </div>
            <div class="modal-footer" id="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" id="modal-confirm">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="/js/json-handler.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        // Check login status
        let currentUser = null;
        
        // Initialize
        function init() {
            const userData = localStorage.getItem('simaraja_current_user');
            if (userData) {
                currentUser = JSON.parse(userData);
            }
            
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = '/pages/auth/login-pemerintah.html';
                return;
            }
            
            loadMahasiswa();
        }
        
        // Load mahasiswa
        function loadMahasiswa() {
            const container = document.getElementById('admin-mahasiswa-list');
            const users = JSON.parse(localStorage.getItem('simaraja_users') || '[]');
            const pengajuanData = JSON.parse(localStorage.getItem('simaraja_pengajuan') || '[]');
            const mahasiswaUsers = users.filter(u => u.role === 'mahasiswa');
            
            if (mahasiswaUsers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users-slash"></i>
                        <p>Belum ada data mahasiswa</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = mahasiswaUsers.map(user => {
                const userPengajuan = pengajuanData.filter(p => p.userId === user.id);
                const totalPengajuan = userPengajuan.length;
                
                return `
                    <div class="mahasiswa-card" id="mahasiswa-${user.id}">
                        <div class="mahasiswa-card-header" onclick="toggleMahasiswaCard(${user.id})">
                            <div class="mahasiswa-info">
                                <div class="mahasiswa-avatar">${user.nama.charAt(0).toUpperCase()}</div>
                                <div>
                                    <h4>${user.nama}</h4>
                                    <p>${user.email}</p>
                                </div>
                            </div>
                            <i class="fas fa-chevron-down toggle-icon"></i>
                        </div>
                        <div class="mahasiswa-card-body">
                            <div class="mahasiswa-detail-row">
                                <span>NIM</span>
                                <strong>${user.nim}</strong>
                            </div>
                            <div class="mahasiswa-detail-row">
                                <span>Jurusan</span>
                                <strong>${user.jurusan}</strong>
                            </div>
                            <div class="mahasiswa-detail-row">
                                <span>Universitas</span>
                                <strong>${user.universitas}</strong>
                            </div>
                            <div class="mahasiswa-detail-row">
                                <span>No. HP</span>
                                <strong>${user.hp}</strong>
                            </div>
                            <div class="mahasiswa-detail-row">
                                <span>Alamat</span>
                                <strong>${user.alamat}</strong>
                            </div>
                            <div class="mahasiswa-detail-row">
                                <span>Total Pengajuan</span>
                                <strong>${totalPengajuan}</strong>
                            </div>
                            <div class="mahasiswa-action-row">
                                <button class="btn btn-delete-mahasiswa" onclick="confirmDeleteMahasiswa(${user.id}, '${user.nama}')">
                                    <i class="fas fa-trash-alt"></i> Hapus Data Mahasiswa
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Toggle mahasiswa card
        function toggleMahasiswaCard(id) {
            document.getElementById('mahasiswa-' + id).classList.toggle('expanded');
        }
        
        // Search mahasiswa
        function searchMahasiswa() {
            const query = document.getElementById('search-mahasiswa').value.toLowerCase();
            const cards = document.querySelectorAll('.mahasiswa-card');
            
            cards.forEach(card => {
                const name = card.querySelector('h4').textContent.toLowerCase();
                const email = card.querySelector('.mahasiswa-info p').textContent.toLowerCase();
                
                if (name.includes(query) || email.includes(query)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        // Confirm delete mahasiswa
        function confirmDeleteMahasiswa(userId, nama) {
            showModal('Hapus Data Mahasiswa', `Apakah Anda yakin ingin menghapus data mahasiswa "${nama}"? Semua pengajuan terkait juga akan dihapus.`, function() {
                deleteMahasiswa(userId);
            });
        }
        
        // Delete mahasiswa
        function deleteMahasiswa(userId) {
            let users = JSON.parse(localStorage.getItem('simaraja_users') || '[]');
            users = users.filter(u => u.id !== userId);
            localStorage.setItem('simaraja_users', JSON.stringify(users));
            
            let pengajuanList = JSON.parse(localStorage.getItem('simaraja_pengajuan') || '[]');
            pengajuanList = pengajuanList.filter(p => p.userId !== userId);
            localStorage.setItem('simaraja_pengajuan', JSON.stringify(pengajuanList));
            
            closeModal();
            loadMahasiswa();
            showToast('Data mahasiswa berhasil dihapus!', 'success');
        }
        
        // Admin menu toggle
        function toggleAdminMenu() {
            document.getElementById('admin-dropdown').classList.toggle('active');
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu-btn') && !e.target.closest('#admin-dropdown')) {
                document.getElementById('admin-dropdown').classList.remove('active');
            }
        });
        
        // Logout
        function confirmLogout() {
            showModal('Konfirmasi Keluar', 'Apakah Anda yakin ingin keluar dari akun?', function() {
                localStorage.removeItem('simaraja_current_user');
                window.location.href = '/';
            });
        }
        
        // Modal functions
        function showModal(title, message, onConfirm) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-confirm').onclick = onConfirm;
        }
        
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
