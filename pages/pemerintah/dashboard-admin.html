<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard Admin Pemerintah - SIMARAJA">
    <title>Dashboard Admin - SIMARAJA</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <!-- Dashboard Page -->
    <div class="dashboard-page admin-page">
        <!-- Header -->
        <header class="dashboard-header admin-header">
            <h1><i class="fas fa-landmark"></i> SIMARAJA</h1>
            <div class="header-actions">
                <button class="notif-btn" onclick="showToast('Fitur notifikasi', 'info')">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge" id="admin-notif-badge" style="display: none;">0</span>
                </button>
                <button class="user-menu-btn" onclick="toggleAdminMenu()">
                    <div class="user-avatar-small admin">
                        <i class="fas fa-user-shield"></i>
                    </div>
                </button>
            </div>
        </header>

        <!-- Admin Dropdown Menu -->
        <div class="user-dropdown" id="admin-dropdown">
            <div class="dropdown-header">
                <div class="dropdown-avatar admin">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h4>Administrator</h4>
                    <p>Pemerintah Raja Ampat</p>
                </div>
            </div>
            <div class="dropdown-menu">
                <a href="#" onclick="confirmLogout()">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dashboard Section -->
            <section id="admin-dashboard" class="dashboard-section">
                <div class="admin-welcome">
                    <h2>Selamat Datang, Administrator</h2>
                    <p>Kelola pengajuan bantuan mahasiswa Raja Ampat</p>
                </div>

                <!-- Stats Cards -->
                <div class="admin-stats-grid">
                    <div class="admin-stat-card pending">
                        <div class="stat-card-header">
                            <i class="fas fa-clock"></i>
                            <span>Pending</span>
                        </div>
                        <div class="stat-card-value" id="admin-pending">0</div>
                    </div>
                    <div class="admin-stat-card diproses">
                        <div class="stat-card-header">
                            <i class="fas fa-spinner"></i>
                            <span>Diproses</span>
                        </div>
                        <div class="stat-card-value" id="admin-diproses">0</div>
                    </div>
                    <div class="admin-stat-card disetujui">
                        <div class="stat-card-header">
                            <i class="fas fa-check-circle"></i>
                            <span>Disetujui</span>
                        </div>
                        <div class="stat-card-value" id="admin-disetujui">0</div>
                    </div>
                    <div class="admin-stat-card ditolak">
                        <div class="stat-card-header">
                            <i class="fas fa-times-circle"></i>
                            <span>Ditolak</span>
                        </div>
                        <div class="stat-card-value" id="admin-ditolak">0</div>
                    </div>
                </div>

                <!-- Total Dana -->
                <div class="total-dana-card">
                    <i class="fas fa-wallet"></i>
                    <div>
                        <span class="dana-label">Total Dana Disetujui</span>
                        <span class="dana-value" id="total-dana-disetujui">Rp 0</span>
                    </div>
                </div>

                <!-- Recent Proposals -->
                <div class="recent-proposals">
                    <div class="section-header-row">
                        <h3>Pengajuan Terbaru</h3>
                        <a href="/pages/pemerintah/verifikasi.html" class="view-all">Lihat Semua</a>
                    </div>
                    <div id="recent-proposals-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav admin-nav">
            <a href="/pages/pemerintah/dashboard-admin.html" class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/pages/pemerintah/verifikasi.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Pengajuan</span>
            </a>
            <a href="/pages/pemerintah/laporan.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Mahasiswa</span>
            </a>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Konfirmasi</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <p id="modal-message">Apakah Anda yakin?</p>
            </div>
            <div class="modal-footer" id="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" id="modal-confirm">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="/js/json-handler.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
    
    <script>
        // Check login status
        let currentUser = null;
        
        // Check if user is logged in
        function checkLoginStatus() {
            const userData = localStorage.getItem('simaraja_current_user');
            if (userData) {
                currentUser = JSON.parse(userData);
            }
            
            if (!currentUser || currentUser.role !== 'admin') {
                window.location.href = '/pages/auth/login-pemerintah.html';
                return false;
            }
            return true;
        }
        
        // Initialize dashboard
        function initDashboard() {
            if (!checkLoginStatus()) return;
            
            // Update stats
            const stats = getAdminStatistics();
            document.getElementById('admin-pending').textContent = stats.pending;
            document.getElementById('admin-diproses').textContent = stats.diproses;
            document.getElementById('admin-disetujui').textContent = stats.disetujui;
            document.getElementById('admin-ditolak').textContent = stats.ditolak;
            
            // Update total dana
            document.getElementById('total-dana-disetujui').textContent = formatCurrency(stats.totalDana);
            
            // Update notification badge
            const badge = document.getElementById('admin-notif-badge');
            if (stats.pending > 0) {
                badge.textContent = stats.pending;
                badge.style.display = 'flex';
            }
            
            // Update recent proposals
            updateRecentProposals();
        }
        
        // Update recent proposals
        function updateRecentProposals() {
            const container = document.getElementById('recent-proposals-list');
            const pengajuanData = getPengajuan();
            const users = getUsers();
            
            const recentPengajuan = [...pengajuanData]
                .sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal))
                .slice(0, 3);
            
            if (recentPengajuan.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Belum ada pengajuan</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = recentPengajuan.map(item => {
                const user = users.find(u => u.id === item.userId);
                return `
                    <div class="recent-item-card" onclick="window.location.href='/pages/pemerintah/verifikasi.html?id=${item.id}'">
                        <div class="recent-item-info">
                            <h4>${user ? user.nama : 'Unknown'}</h4>
                            <p>${formatDate(item.tanggal)} - ${formatCurrency(item.dana)}</p>
                        </div>
                        <span class="status-badge status-${item.status}">
                            ${capitalizeFirst(item.status)}
                        </span>
                    </div>
                `;
            }).join('');
        }
        
        // Admin menu toggle
        function toggleAdminMenu() {
            document.getElementById('admin-dropdown').classList.toggle('active');
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu-btn') && !e.target.closest('#admin-dropdown')) {
                document.getElementById('admin-dropdown').classList.remove('active');
            }
        });
        
        // Logout
        function confirmLogout() {
            showModal('Konfirmasi Keluar', 'Apakah Anda yakin ingin keluar dari akun?', function() {
                localStorage.removeItem('simaraja_current_user');
                window.location.href = '/';
            });
        }
        
        // Modal functions
        function showModal(title, message, onConfirm) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-confirm').onclick = onConfirm;
        }
        
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
