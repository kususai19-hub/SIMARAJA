<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Profil Mahasiswa - SIMARAJA">
    <title>Profil - SIMARAJA</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <!-- Dashboard Page -->
    <div class="dashboard-page">
        <!-- Header -->
        <header class="dashboard-header">
            <h1><i class="fas fa-landmark"></i> SIMARAJA</h1>
            <div class="header-actions">
                <button class="user-menu-btn" onclick="toggleUserMenu()">
                    <div class="user-avatar-small" id="header-avatar">A</div>
                </button>
            </div>
        </header>

        <!-- User Dropdown Menu -->
        <div class="user-dropdown" id="user-dropdown">
            <div class="dropdown-header">
                <div class="dropdown-avatar" id="dropdown-avatar">A</div>
                <div>
                    <h4 id="dropdown-nama">Nama Mahasiswa</h4>
                    <p id="dropdown-email">email@example.com</p>
                </div>
            </div>
            <div class="dropdown-menu">
                <a href="/pages/mahasiswa/profile.html">
                    <i class="fas fa-user"></i> Profil Saya
                </a>
                <a href="#" onclick="confirmLogout()">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <main class="dashboard-main">
            <section class="dashboard-section">
                <div class="section-title">
                    <button class="back-section-btn" onclick="window.location.href='/pages/mahasiswa/dashboard.html'">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2>Profil Saya</h2>
                </div>

                <div class="profile-container">
                    <div class="profile-header-card">
                        <div class="profile-avatar-large" id="profile-avatar">A</div>
                        <h3 id="profile-nama">Nama Mahasiswa</h3>
                        <p id="profile-email">email@example.com</p>
                    </div>

                    <div class="profile-details-card">
                        <div class="profile-detail-item">
                            <i class="fas fa-id-card"></i>
                            <div>
                                <span class="label">NIM</span>
                                <span class="value" id="profile-nim">-</span>
                            </div>
                        </div>
                        <div class="profile-detail-item">
                            <i class="fas fa-graduation-cap"></i>
                            <div>
                                <span class="label">Jurusan</span>
                                <span class="value" id="profile-jurusan">-</span>
                            </div>
                        </div>
                        <div class="profile-detail-item">
                            <i class="fas fa-university"></i>
                            <div>
                                <span class="label">Universitas</span>
                                <span class="value" id="profile-univ">-</span>
                            </div>
                        </div>
                        <div class="profile-detail-item">
                            <i class="fas fa-phone"></i>
                            <div>
                                <span class="label">No. HP</span>
                                <span class="value" id="profile-hp">-</span>
                            </div>
                        </div>
                        <div class="profile-detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <span class="label">Alamat</span>
                                <span class="value" id="profile-alamat">-</span>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-danger btn-full" onclick="confirmLogout()">
                        <i class="fas fa-sign-out-alt"></i> Keluar dari Akun
                    </button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="/pages/mahasiswa/dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Beranda</span>
            </a>
            <a href="/pages/mahasiswa/pengajuan.html" class="nav-item">
                <i class="fas fa-plus-circle"></i>
                <span>Ajukan</span>
            </a>
            <a href="/pages/mahasiswa/riwayat.html" class="nav-item">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </a>
            <a href="/pages/mahasiswa/profile.html" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>Profil</span>
            </a>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Konfirmasi</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <p id="modal-message">Apakah Anda yakin?</p>
            </div>
            <div class="modal-footer" id="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" id="modal-confirm">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="/js/json-handler.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        // Check login status
        let currentUser = null;
        
        // Initialize
        function init() {
            const userData = localStorage.getItem('simaraja_current_user');
            if (userData) {
                currentUser = JSON.parse(userData);
            }
            
            if (!currentUser) {
                window.location.href = '/pages/auth/login-mahasiswa.html';
                return;
            }
            
            // Update user info
            document.getElementById('header-avatar').textContent = currentUser.nama.charAt(0).toUpperCase();
            document.getElementById('dropdown-avatar').textContent = currentUser.nama.charAt(0).toUpperCase();
            document.getElementById('dropdown-nama').textContent = currentUser.nama;
            document.getElementById('dropdown-email').textContent = currentUser.email;
            
            // Update profile
            document.getElementById('profile-avatar').textContent = currentUser.nama.charAt(0).toUpperCase();
            document.getElementById('profile-nama').textContent = currentUser.nama;
            document.getElementById('profile-email').textContent = currentUser.email;
            document.getElementById('profile-nim').textContent = currentUser.nim;
            document.getElementById('profile-jurusan').textContent = currentUser.jurusan;
            document.getElementById('profile-univ').textContent = currentUser.universitas;
            document.getElementById('profile-hp').textContent = currentUser.hp;
            document.getElementById('profile-alamat').textContent = currentUser.alamat;
        }
        
        // User menu toggle
        function toggleUserMenu() {
            document.getElementById('user-dropdown').classList.toggle('active');
        }
        
        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu-btn') && !e.target.closest('.user-dropdown')) {
                document.getElementById('user-dropdown').classList.remove('active');
            }
        });
        
        // Logout
        function confirmLogout() {
            showModal('Konfirmasi Keluar', 'Apakah Anda yakin ingin keluar dari akun?', function() {
                localStorage.removeItem('simaraja_current_user');
                window.location.href = '/';
            });
        }
        
        // Modal functions
        function showModal(title, message, onConfirm) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-confirm').onclick = onConfirm;
        }
        
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
