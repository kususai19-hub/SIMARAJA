<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrasi Mahasiswa - SIMARAJA">
    <title>Daftar Akun - SIMARAJA</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <!-- Register Page -->
    <div class="register-page">
        <div class="auth-container auth-container-wide">
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2>Daftar Akun Baru</h2>
                <p>Daftarkan diri Anda untuk mengajukan bantuan</p>
            </div>
            
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Lengkap</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="reg-nama" placeholder="Nama Lengkap" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="reg-email" placeholder="Email" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>NIM</label>
                        <div class="input-group">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="reg-nim" placeholder="NIM" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Jurusan</label>
                        <div class="input-group">
                            <i class="fas fa-graduation-cap"></i>
                            <input type="text" id="reg-jurusan" placeholder="Jurusan" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Universitas</label>
                        <div class="input-group">
                            <i class="fas fa-university"></i>
                            <input type="text" id="reg-universitas" placeholder="Universitas" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>No. HP</label>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="reg-hp" placeholder="No. HP" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Alamat di Raja Ampat</label>
                    <div class="input-group">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="reg-alamat" placeholder="Alamat di Raja Ampat" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Password (min. 6 karakter)" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-user-plus"></i> Daftar
                </button>
            </form>
            
            <p class="auth-footer">
                Sudah punya akun? <a href="/pages/auth/login-mahasiswa.html">Masuk</a>
            </p>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- JavaScript Files -->
    <script src="/js/json-handler.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        // Handle registration
        function handleRegister(event) {
            event.preventDefault();
            
            const nama = document.getElementById('reg-nama').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const nim = document.getElementById('reg-nim').value.trim();
            const jurusan = document.getElementById('reg-jurusan').value.trim();
            const universitas = document.getElementById('reg-universitas').value.trim();
            const hp = document.getElementById('reg-hp').value.trim();
            const alamat = document.getElementById('reg-alamat').value.trim();
            const password = document.getElementById('reg-password').value;
            
            const users = getUsers();
            
            // Check if email already exists
            if (users.find(u => u.email === email)) {
                showToast('Email sudah terdaftar!', 'error');
                return;
            }
            
            // Check if NIM already exists
            if (users.find(u => u.nim === nim)) {
                showToast('NIM sudah terdaftar!', 'error');
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now().toString(),
                email: email,
                password: password,
                role: 'mahasiswa',
                nama: nama,
                nim: nim,
                jurusan: jurusan,
                universitas: universitas,
                hp: hp,
                alamat: alamat,
                createdAt: new Date().toISOString()
            };
            
            addUser(newUser);
            
            showToast('Pendaftaran berhasil! Silakan login.', 'success');
            
            // Clear form
            document.getElementById('register-form').reset();
            
            // Go to login
            setTimeout(() => {
                window.location.href = '/pages/auth/login-mahasiswa.html';
            }, 1500);
        }
    </script>
</body>
</html>
