<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Mahasiswa - SIMARAJA">
    <title>Login Mahasiswa - SIMARAJA</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <!-- Login Page -->
    <div class="login-page">
        <div class="auth-container">
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h2>Masuk Akun</h2>
                <p>Masuk sebagai Mahasiswa</p>
            </div>
            
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="forgot-password-link">
                    <a href="/pages/auth/forgot-password.html">Lupa Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>
            
            <p class="auth-footer">
                Belum punya akun? <a href="/pages/auth/register.html">Daftar Sekarang</a>
            </p>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- JavaScript Files -->
    <script src="/js/json-handler.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        // Set login type
        let loginType = 'mahasiswa';
        
        // Handle login for this page
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password && u.role === 'mahasiswa');
            
            if (user) {
                currentUser = user;
                localStorage.setItem('simaraja_current_user', JSON.stringify(user));
                showToast('Login berhasil! Selamat datang, ' + user.nama, 'success');
                
                // Redirect to mahasiswa dashboard
                setTimeout(() => {
                    window.location.href = '/pages/mahasiswa/dashboard.html';
                }, 1000);
            } else {
                showToast('Email atau password salah!', 'error');
            }
        }
    </script>
</body>
</html>
